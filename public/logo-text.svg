<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- io Logo - i inside O circle (same as center badge) -->
  <!-- O - outer circle -->
  <circle cx="24" cy="24" r="22" fill="none" stroke="#34D399" stroke-width="2.5"/>
  <!-- O - inner subtle circle -->
  <circle cx="24" cy="24" r="16" fill="none" stroke="rgba(6, 182, 212, 0.4)" stroke-width="1.5"/>
  <!-- i - stem (vertical line inside circle) -->
  <line x1="24" y1="30" x2="24" y2="42" stroke="#06B6D4" stroke-width="2.5" stroke-linecap="round"/>
  <!-- i - dot (top of stem) -->
  <circle cx="24" cy="18" r="2.5" fill="#06B6D4"/>
</svg>
