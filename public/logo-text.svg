<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 36" width="200" height="36">
  <!-- io Logo (small) - i on left, O on right -->
  <g transform="translate(0, 6)">
    <!-- i - stem (vertical line) -->
    <line x1="6" y1="8" x2="6" y2="18" stroke="#06B6D4" stroke-width="1.5" stroke-linecap="round"/>
    <!-- i - dot -->
    <circle cx="6" cy="5" r="1.5" fill="#06B6D4"/>
    
    <!-- O - outer circle -->
    <circle cx="28" cy="12" r="10" fill="none" stroke="#34D399" stroke-width="1.5"/>
    <!-- O - inner circle -->
    <circle cx="28" cy="12" r="7" fill="none" stroke="rgba(6, 182, 212, 0.4)" stroke-width="0.8"/>
  </g>
  
  <!-- Text: httping -->
  <text x="52" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#F3F4F6">
    httping
  </text>
  
  <!-- Text: .io (gray) -->
  <text x="140" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" letter-spacing="2" fill="#9CA3AF">.io</text>
</svg>
