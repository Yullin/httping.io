<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" width="300" height="80">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#34D399" />
    </linearGradient>
  </defs>
  
  <!-- io Logo -->
  <g transform="translate(20, 16)">
    <!-- O - outer circle with pulse effect (static representation) -->
    <circle cx="58" cy="24" r="22" fill="none" stroke="#34D399" stroke-width="3"/>
    <circle cx="58" cy="24" r="16" fill="none" stroke="rgba(6, 182, 212, 0.4)" stroke-width="1.5"/>
    
    <!-- i - stem -->
    <line x1="22" y1="12" x2="22" y2="36" stroke="#06B6D4" stroke-width="3" stroke-linecap="round"/>
    
    <!-- i - dot -->
    <circle cx="22" cy="8" r="3" fill="#06B6D4"/>
  </g>
  
  <!-- Text: httping -->
  <text x="110" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#F3F4F6">
    httping
  <tspan x="110" y="62" font-size="16" font-weight="400" fill="#9CA3AF">.io</tspan>
  </text>
  
  <!-- Signal-like waves (decorative) -->
  <g transform="translate(250, 24)" opacity="0.3">
    <path d="M 0,0 Q 5,-8 10,0 Q 15,8 20,0" stroke="#06B6D4" stroke-width="1.5" fill="none"/>
    <path d="M 2,-4 Q 7,-12 12,-4 Q 17,4 22,-4" stroke="#34D399" stroke-width="1.5" fill="none"/>
    <path d="M 4,-8 Q 9,-16 14,-8 Q 19,0 24,-8" stroke="#06B6D4" stroke-width="1.5" fill="none"/>
  </g>
</svg>
