<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="freshGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34D399;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="lightGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#67E8F9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6EE7B7;stop-opacity:1" />
    </linearGradient>
    
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Icon: Signal waves with ping dot -->
  <g transform="translate(20, 25)">
    <!-- Signal waves - thin and light -->
    <circle cx="35" cy="35" r="12" fill="none" stroke="url(#freshGradient)" stroke-width="1.5" opacity="0.6">
      <animate attributeName="r" from="12" to="28" dur="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" from="0.6" to="0" dur="2s" repeatCount="indefinite" />
    </circle>
    <circle cx="35" cy="35" r="12" fill="none" stroke="url(#freshGradient)" stroke-width="1.5" opacity="0.4">
      <animate attributeName="r" from="12" to="38" dur="2s" begin="0.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" from="0.4" to="0" dur="2s" begin="0.5s" repeatCount="indefinite" />
    </circle>
    
    <!-- Center dot - the "ping" -->
    <circle cx="35" cy="35" r="6" fill="url(#freshGradient)" filter="url(#softGlow)" />
    
    <!-- Data flow lines - light and airy -->
    <line x1="42" y1="35" x2="58" y2="35" stroke="url(#freshGradient)" stroke-width="1.5" stroke-linecap="round">
      <animate attributeName="x2" values="58;66;58" dur="1.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite" />
    </line>
    <line x1="42" y1="35" x2="58" y2="35" stroke="url(#freshGradient)" stroke-width="1.5" stroke-linecap="round" transform="rotate(-30, 35, 35)">
      <animate attributeName="x2" values="58;68;58" dur="1.8s" begin="0.3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" begin="0.3s" repeatCount="indefinite" />
    </line>
    <line x1="42" y1="35" x2="58" y2="35" stroke="url(#freshGradient)" stroke-width="1.5" stroke-linecap="round" transform="rotate(30, 35, 35)">
      <animate attributeName="x2" values="58;64;58" dur="1.6s" begin="0.6s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1;0.3;1" dur="1.6s" begin="0.6s" repeatCount="indefinite" />
    </line>
  </g>
  
  <!-- Text part -->
  <g transform="translate(95, 35)">
    <!-- httping.io text -->
    <text x="0" y="20" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="32" font-weight="300" letter-spacing="2" fill="url(#freshGradient)">httping</text>
    <text x="0" y="48" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="300" letter-spacing="4" fill="#9CA3AF">.io</text>
    
    <!-- Light accent line -->
    <line x1="0" y1="58" x2="200" y2="58" stroke="url(#lightGradient)" stroke-width="1" opacity="0.5" />
  </g>
</svg>
