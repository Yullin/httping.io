<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- io Logo - i inside O circle (favicon version) -->
  <!-- O - outer circle -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#34D399" stroke-width="2.5"/>
  <!-- O - inner subtle circle -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="rgba(6, 182, 212, 0.4)" stroke-width="1.5"/>
  <!-- i - stem (vertical line inside circle) -->
  <line x1="32" y1="38" x2="32" y2="50" stroke="#06B6D4" stroke-width="2.5" stroke-linecap="round"/>
  <!-- i - dot (top of stem) -->
  <circle cx="32" cy="26" r="2.5" fill="#06B6D4"/>
</svg>
