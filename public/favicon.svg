<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- io Logo (favicon version) - i on left, O on right -->
  <g transform="translate(8, 8)">
    <!-- i - stem -->
    <line x1="10" y1="16" x2="10" y2="36" stroke="#06B6D4" stroke-width="2.5" stroke-linecap="round"/>
    <!-- i - dot -->
    <circle cx="10" cy="12" r="2.5" fill="#06B6D4"/>
    
    <!-- O - outer circle -->
    <circle cx="40" cy="24" r="22" fill="none" stroke="#34D399" stroke-width="2.5"/>
    <!-- O - inner circle -->
    <circle cx="40" cy="24" r="16" fill="none" stroke="rgba(6, 182, 212, 0.4)" stroke-width="1.5"/>
  </g>
</svg>
