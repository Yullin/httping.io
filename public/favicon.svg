<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="freshGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34D399;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Signal waves -->
  <circle cx="32" cy="32" r="10" fill="none" stroke="url(#freshGradient)" stroke-width="1.5" opacity="0.5">
    <animate attributeName="r" from="10" to="24" dur="2s" repeatCount="indefinite" />
    <animate attributeName="opacity" from="0.5" to="0" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="32" cy="32" r="10" fill="none" stroke="url(#freshGradient)" stroke-width="1.5" opacity="0.3">
    <animate attributeName="r" from="10" to="30" dur="2s" begin="0.5s" repeatCount="indefinite" />
    <animate attributeName="opacity" from="0.3" to="0" dur="2s" begin="0.5s" repeatCount="indefinite" />
  </circle>
  
  <!-- Center dot -->
  <circle cx="32" cy="32" r="5" fill="url(#freshGradient)" />
</svg>
